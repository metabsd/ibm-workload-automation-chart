{{ $fullName := include "aida-nginx.fullname" . }}
{{- $routeType := .Values.routes.routeType | default .Values.global.routeType | default "reencrypt" -}}
kind: Route
apiVersion: route.openshift.io/v1
metadata:
  name: {{ $fullName }}
  labels:
{{ include "aida-nginx.labels" . | indent 4 }}
  annotations:
    openshift.io/host.generated: 'true'
    haproxy.router.openshift.io/cookie_name: {{ $fullName }}-affinity-cookie
spec:
  host: 
  to:
    kind: Service
    name: {{ $fullName }}
    weight: 100
  port:
    targetPort: https
  tls:
    termination: {{ $routeType }}
    {{- if ne ($routeType | upper) "PASSTHROUGH" }}
    insecureEdgeTerminationPolicy: None
    {{- end }}
    {{- if eq ($routeType | upper) "REENCRYPT" }}
    {{- $secret := lookup "v1" "Secret" .Release.Namespace "ca-key-pair" }}
    {{- if and $secret (hasKey $secret.data "tls.crt") }}
    destinationCACertificate: |
{{ index $secret.data "tls.crt" | b64dec | indent 6 }}
    {{- end }}
    {{- end }}
  wildcardPolicy: None
status:
  ingress:
    - host: 
      routerName: default
      conditions:
        - type: Admitted
          status: 'True'
      wildcardPolicy: None
{{- end }}
{{- end }}
